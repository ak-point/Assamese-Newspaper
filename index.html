<!DOCTYPE html>
<html lang="as">
<head>
  <meta charset="UTF-8">
  <title>অসমীয়া নিউজ</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #c62828;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 15px;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }

    /* 🔥 Clickable wrapper */
    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card:active {
      transform: scale(0.98);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 12px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #222;
    }

    .loading {
      text-align: center;
      font-size: 18px;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>📰 অসমীয়া নিউজ পোর্টেল</header>

<div class="container">
  <div class="news-grid" id="newsContainer">
    <div class="loading">Loading news...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔐 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "assamese-newspaper-93903.firebaseapp.com",
  databaseURL: "https://assamese-newspaper-93903-default-rtdb.firebaseio.com",
  projectId: "assamese-newspaper-93903",
  storageBucket: "assamese-newspaper-93903.appspot.com"
};

// Init
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Reference
const newsRef = ref(db, "news");

// Load data
onValue(newsRef, (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("newsContainer");

  if (!data) {
    container.innerHTML = "<div class='loading'>No news available</div>";
    return;
  }

  let html = "";

  Object.values(data).reverse().forEach(item => {
    html += `
      <a href="${item.link || '#'}" target="_blank" class="card-link">
        <div class="card">
          <img src="${item.image || ''}" alt="news image">

          <div class="card-content">
            <div class="title">
              ${item.header || "No Title"}
            </div>
          </div>
        </div>
      </a>
    `;
  });

  container.innerHTML = html;

}, (error) => {
  document.getElementById("newsContainer").innerHTML =
    "<div class='loading'>Error loading data</div>";
  console.error(error);
});
</script>

</body>
</html>
