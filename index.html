<!DOCTYPE html>
<html lang="as">
<head>
  <meta charset="UTF-8">
  <title>অসমীয়া নিউজ</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #c62828;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin: auto;
      padding: 10px;
    }

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
      width: 100%;
    }

    .card {
      width: 100%;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      transition: 0.2s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card:active {
      transform: scale(0.98);
    }

    .card img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .card-content {
      padding: 12px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #222;
      line-height: 1.4;
    }

    .loading {
      text-align: center;
      font-size: 16px;
      padding: 20px;
    }

    @media (max-width: 600px) {
      header {
        font-size: 18px;
        padding: 12px;
      }

      .container {
        padding: 8px;
      }

      .card img {
        height: 180px;
      }

      .title {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<header>📰 অসমীয়া নিউজ পোর্টেল</header>

<div class="container">
  <div class="news-list" id="newsContainer">
    <div class="loading">Loading news...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔐 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "assamese-newspaper-93903.firebaseapp.com",
  databaseURL: "https://assamese-newspaper-93903-default-rtdb.firebaseio.com",
  projectId: "assamese-newspaper-93903",
  storageBucket: "assamese-newspaper-93903.appspot.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const newsRef = ref(db, "news");

onValue(newsRef, (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("newsContainer");

  if (!data) {
    container.innerHTML = "<div class='loading'>No news available</div>";
    return;
  }

  let html = "";

  Object.values(data).reverse().forEach(item => {
    html += `
      <a href="${item.link || '#'}" class="card-link">
        <div class="card">
          <img src="${item.image || ''}" alt="news image">
          <div class="card-content">
            <div class="title">
              ${item.header || "No Title"}
            </div>
          </div>
        </div>
      </a>
    `;
  });

  container.innerHTML = html;

}, (error) => {
  document.getElementById("newsContainer").innerHTML =
    "<div class='loading'>Error loading data</div>";
  console.error(error);
});
</script>

</body>
</html>
